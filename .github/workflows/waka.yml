# Writes WakaTime coding metrics into README.md between <!--START_SECTION:waka--> and <!--END_SECTION:waka-->
# Before this works, two secrets must exist in repo Settings → Secrets and Variables → Actions:
#   WAKATIME_API_KEY  →  from https://wakatime.com/settings/api-key
#   GH_TOKEN          →  GitHub PAT with `repo` + `user` scope from https://github.com/settings/tokens
# After saving secrets, trigger manually: Actions tab → "Waka Readme" → Run workflow
name: Waka Readme

on:
  schedule:
    # Runs at 18:30 UTC (midnight IST) — fresh stats available each morning
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with WakaTime Metrics
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Show OS, editor, and top projects — gives visitors signal about daily workflow, not just language stats
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_COMMIT: "True"
          # Day-of-week distribution reveals whether John codes on weekends — strong signal for evaluators
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_SHORT_INFO: "True"
          # Lines of code disabled — heavy operation; re-enable once repo volume is large enough to be meaningful
          SHOW_LINES_OF_CODE: "False"